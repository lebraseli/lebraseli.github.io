<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riddle Gate</title>
  <style>
    :root {
      --bg-1: #071126;
      --bg-2: #111b34;
      --text: #eef2ff;
      --muted: #aeb8d5;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.14);
      --box-bg: rgba(255,255,255,0.05);
      --box-border: rgba(255,255,255,0.14);
      --accent: #d8b16b;
      --accent-strong: #e2bc78;
      --accent-soft: rgba(216, 177, 107, 0.16);
      --status: #f1cd8b;
      --shadow: 0 24px 70px rgba(0,0,0,0.40);
      --reveal-bg-1: #150d08;
      --reveal-bg-2: #2a160d;
    }

    body.light {
      --bg-1: #eef2f8;
      --bg-2: #dde5f1;
      --text: #1c2740;
      --muted: #5f6d88;
      --panel: rgba(255, 255, 255, 0.72);
      --panel-border: rgba(28, 39, 64, 0.10);
      --box-bg: rgba(255,255,255,0.66);
      --box-border: rgba(28, 39, 64, 0.12);
      --accent: #b9812f;
      --accent-strong: #9f6f27;
      --accent-soft: rgba(185, 129, 47, 0.14);
      --status: #9f6f27;
      --shadow: 0 24px 70px rgba(42,57,89,0.14);
      --reveal-bg-1: #f6ede2;
      --reveal-bg-2: #ead8c3;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      margin: 0;
      min-height: 100%;
      background: var(--bg-1);
      overscroll-behavior: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(216,177,107,0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.05), transparent 24%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      background-color: var(--bg-1);
      transition: background 220ms ease, color 220ms ease;
      overscroll-behavior: none;
    }

    .page {
      min-height: 100vh;
      width: 100%;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .shell {
      width: min(100%, 860px);
      border-radius: 30px;
      padding: 52px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.04));
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.04) 48%, transparent 100%);
      pointer-events: none;
    }

    .theme-toggle {
      position: absolute;
      top: 22px;
      right: 22px;
      width: 48px;
      height: 48px;
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease, border-color 180ms ease;
      z-index: 2;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.15);
      background: rgba(255,255,255,0.12);
    }

    body.light .theme-toggle {
      background: rgba(255,255,255,0.88);
      border-color: rgba(28,39,64,0.14);
      box-shadow: 0 8px 22px rgba(42,57,89,0.08);
    }

    .theme-icon {
      position: relative;
      width: 20px;
      height: 20px;
      display: inline-block;
    }

    .theme-icon.sun::before {
      content: "☀";
      font-size: 20px;
      line-height: 20px;
    }

    .theme-icon.moon::before {
      content: "☾";
      font-size: 22px;
      line-height: 20px;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 12px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.4rem, 6vw, 4.6rem);
      line-height: 0.98;
      font-weight: 600;
      max-width: 9ch;
    }

    .subtext {
      margin: 0 0 34px;
      max-width: 34ch;
      font-size: 1.04rem;
      line-height: 1.75;
      color: var(--muted);
    }

    .code-area {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .digit {
      width: 96px;
      height: 112px;
      border-radius: 24px;
      border: 1px solid var(--box-border);
      background: var(--box-bg);
      color: var(--text);
      text-align: center;
      font-size: 3rem;
      font-weight: 700;
      outline: none;
      text-transform: uppercase;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .digit:focus {
      transform: translateY(-1px);
      border-color: rgba(216,177,107,0.7);
      box-shadow: 0 0 0 5px var(--accent-soft);
    }

    body.light .digit {
      background: rgba(255,255,255,0.72);
      border-color: rgba(28,39,64,0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
    }

    .controls {
      margin-bottom: 18px;
    }

    .button {
      appearance: none;
      border: 1px solid rgba(216,177,107,0.45);
      border-radius: 999px;
      padding: 14px 28px;
      background: linear-gradient(180deg, rgba(216,177,107,0.16), rgba(216,177,107,0.08));
      color: #fff8ea;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(0,0,0,0.18);
      border-color: rgba(216,177,107,0.62);
    }

    body.light .button {
      color: #fff;
      background: linear-gradient(180deg, #ca9443, #b37d2d);
      border-color: #a97328;
      box-shadow: 0 12px 24px rgba(185,129,47,0.22);
    }

    body.light .button:hover {
      background: linear-gradient(180deg, #d19b48, #ba8430);
    }

    .tries {
      font-size: 0.98rem;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .status {
      min-height: 28px;
      font-size: 1rem;
      color: var(--status);
    }

    .locked .digit,
    .locked .button {
      opacity: 0.55;
      pointer-events: none;
    }

    .reveal-screen {
      min-height: 100vh;
      width: 100%;
      display: none;
      place-items: center;
      padding: 28px;
      background:
        radial-gradient(circle at top center, rgba(255,185,85,0.18), transparent 22%),
        radial-gradient(circle at center, rgba(255,140,40,0.08), transparent 30%),
        linear-gradient(180deg, var(--reveal-bg-1), var(--reveal-bg-2));
    }

    .reveal-screen.active {
      display: grid;
    }

    .reveal-wrap {
      width: min(100%, 980px);
      text-align: center;
      color: #fff8ec;
    }

    body.light .reveal-wrap {
      color: #2b1b10;
    }

    .reveal-mark {
      text-transform: uppercase;
      letter-spacing: 0.28em;
      font-size: 0.78rem;
      margin-bottom: 20px;
      opacity: 0.86;
    }

    .reveal-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.6rem, 7vw, 5.4rem);
      line-height: 1.02;
      font-weight: 600;
      margin: 0 0 30px;
    }

    .riddle-frame {
      padding: 38px 34px;
      border-radius: 28px;
      border: 1px solid rgba(255, 225, 175, 0.22);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      box-shadow: 0 22px 70px rgba(0,0,0,0.24);
    }

    body.light .riddle-frame {
      border-color: rgba(159,111,39,0.20);
      background: rgba(255,255,255,0.45);
      box-shadow: 0 20px 60px rgba(126,92,45,0.12);
    }

    .riddle {
      margin: 0;
      white-space: pre-line;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      .page,
      .reveal-screen {
        padding: 16px;
      }

      .shell {
        padding: 28px 22px 24px;
        border-radius: 24px;
      }

      h1 {
        max-width: none;
        font-size: clamp(2.2rem, 11vw, 3.6rem);
      }

      .subtext {
        font-size: 1rem;
        max-width: none;
      }

      .code-area {
        gap: 10px;
      }

      .digit {
        width: 58px;
        height: 72px;
        border-radius: 18px;
        font-size: 2rem;
      }

      .riddle-frame {
        padding: 28px 22px;
      }

      .riddle {
        font-size: clamp(1.8rem, 8vw, 2.6rem);
      }
    }
  </style>
</head>
<body>
  <section class="page" id="entryScreen">
    <main class="shell" id="shell">
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle light and dark mode">
        <span class="theme-icon moon" id="themeIcon"></span>
      </button>

      <div class="eyebrow">Private Entry</div>
      <h1>Enter the six-character code</h1>
      <p class="subtext">
        A single code unlocks what waits beyond. Enter the correct sequence to reveal the hidden verse.
      </p>

      <section aria-label="Code entry">
        <div class="code-area">
          <input class="digit" type="text" maxlength="1" autocomplete="off" inputmode="text" />
          <input class="digit" type="text" maxlength="1" autocomplete="off" inputmode="text" />
          <input class="digit" type="text" maxlength="1" autocomplete="off" inputmode="text" />
          <input class="digit" type="text" maxlength="1" autocomplete="off" inputmode="text" />
          <input class="digit" type="text" maxlength="1" autocomplete="off" inputmode="text" />
          <input class="digit" type="text" maxlength="1" autocomplete="off" inputmode="text" />
        </div>

        <div class="controls">
          <button class="button" id="unlockBtn" type="button">Unlock</button>
        </div>

        <div class="tries" id="triesText">3 attempts remaining</div>
        <div class="status" id="status" aria-live="polite"></div>
      </section>
    </main>
  </section>

  <section class="reveal-screen" id="revealScreen">
    <div class="reveal-wrap">
      <div class="reveal-mark">Riddle Revealed</div>
      <h2 class="reveal-title">The Hidden Verse</h2>
      <div class="riddle-frame">
        <p class="riddle">I dance without feet,
I hunger yet never eat,
Feed me and I grow tall—
Starve me, and I fall.</p>
      </div>
    </div>
  </section>

  <script>
    const inputs = Array.from(document.querySelectorAll('.digit'));
    const unlockBtn = document.getElementById('unlockBtn');
    const triesText = document.getElementById('triesText');
    const status = document.getElementById('status');
    const shell = document.getElementById('shell');
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const entryScreen = document.getElementById('entryScreen');
    const revealScreen = document.getElementById('revealScreen');

    const validCodes = ['3HL3NO', '3HL3N0'];
    const maxAttempts = 3;

    const attemptsKey = 'riddle_attempts_remaining';
    const lockedKey = 'riddle_locked';
    const themeKey = 'riddle_theme';
    const solvedKey = 'riddle_solved';

    function getCode() {
      return inputs.map(input => input.value.toUpperCase()).join('');
    }

    function getRemainingAttempts() {
      const stored = parseInt(localStorage.getItem(attemptsKey), 10);
      return Number.isNaN(stored) ? maxAttempts : stored;
    }

    function setRemainingAttempts(value) {
      localStorage.setItem(attemptsKey, String(value));
    }

    function isLocked() {
      return localStorage.getItem(lockedKey) === 'true';
    }

    function setLocked(value) {
      localStorage.setItem(lockedKey, value ? 'true' : 'false');
    }

    function isSolved() {
      return localStorage.getItem(solvedKey) === 'true';
    }

    function setSolved(value) {
      localStorage.setItem(solvedKey, value ? 'true' : 'false');
    }

    function applyTheme(theme) {
      if (theme === 'light') {
        document.body.classList.add('light');
        themeIcon.className = 'theme-icon sun';
      } else {
        document.body.classList.remove('light');
        themeIcon.className = 'theme-icon moon';
      }
      localStorage.setItem(themeKey, theme);
    }

    function updateAttemptsUI() {
      const remaining = getRemainingAttempts();

      if (isLocked()) {
        triesText.textContent = 'No attempts remaining.';
        shell.classList.add('locked');
        status.textContent = 'This page has been locked after 3 incorrect attempts.';
      } else {
        triesText.textContent = remaining === 1 ? '1 attempt remaining' : `${remaining} attempts remaining`;
        shell.classList.remove('locked');
      }
    }

    function showRevealScreen() {
      entryScreen.style.display = 'none';
      revealScreen.classList.add('active');
    }

    function showEntryScreen() {
      entryScreen.style.display = 'grid';
      revealScreen.classList.remove('active');
    }

    function handleUnlock() {
      if (isLocked()) {
        updateAttemptsUI();
        return;
      }

      const code = getCode();

      if (code.length !== 6) {
        status.textContent = 'Please enter all six characters.';
        return;
      }

      if (validCodes.includes(code)) {
        status.textContent = 'Code accepted.';
        setSolved(true);
        showRevealScreen();
        return;
      }

      const remaining = Math.max(0, getRemainingAttempts() - 1);
      setRemainingAttempts(remaining);

      if (remaining === 0) {
        setLocked(true);
        status.textContent = 'This page has been locked after 3 incorrect attempts.';
      } else {
        status.textContent = `That code is not correct. ${remaining === 1 ? '1 attempt remaining.' : `${remaining} attempts remaining.`}`;
      }

      updateAttemptsUI();
    }

    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        const clean = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        e.target.value = clean;

        if (clean && index < inputs.length - 1) {
          inputs[index + 1].focus();
          inputs[index + 1].select();
        }
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) {
          inputs[index - 1].focus();
        }

        if (e.key === 'ArrowLeft' && index > 0) {
          inputs[index - 1].focus();
        }

        if (e.key === 'ArrowRight' && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }

        if (e.key === 'Enter') {
          e.preventDefault();
          handleUnlock();
        }
      });

      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = (e.clipboardData.getData('text') || '')
          .toUpperCase()
          .replace(/[^A-Z0-9]/g, '')
          .slice(0, 6);

        pasted.split('').forEach((char, i) => {
          if (inputs[i]) inputs[i].value = char;
        });

        const nextIndex = Math.min(pasted.length, inputs.length - 1);
        inputs[nextIndex].focus();
      });
    });

    unlockBtn.addEventListener('click', handleUnlock);

    themeToggle.addEventListener('click', () => {
      const nextTheme = document.body.classList.contains('light') ? 'dark' : 'light';
      applyTheme(nextTheme);
    });

    const savedTheme = localStorage.getItem(themeKey) || 'dark';
    applyTheme(savedTheme);

    if (localStorage.getItem(attemptsKey) === null) {
      setRemainingAttempts(maxAttempts);
    }

    updateAttemptsUI();

    if (isSolved()) {
      showRevealScreen();
    } else {
      showEntryScreen();
      inputs[0].focus();
    }
  </script>
</body>
</html>
