<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Clue</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-solid: #071126;
      --bg-1: #09142d;
      --bg-2: #0f1c3a;
      --glow-a: rgba(216, 177, 107, 0.10);
      --glow-b: rgba(76, 111, 191, 0.12);
      --panel-top: rgba(255, 255, 255, 0.07);
      --panel-bottom: rgba(255, 255, 255, 0.035);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #edf2ff;
      --muted: #aeb8d5;
      --box-bg: rgba(255, 255, 255, 0.05);
      --box-border: rgba(255, 255, 255, 0.11);
      --accent: #d8b16b;
      --accent-2: #e2bc78;
      --accent-soft: rgba(216, 177, 107, 0.16);
      --button-text: #fffaf0;
      --status: #efca87;
      --reveal-bg-1: #160d08;
      --reveal-bg-2: #2a160c;
      --reveal-text: #fff7eb;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
    }

    body.light {
      color-scheme: light;
      --bg-solid: #e9eef6;
      --bg-1: #eef3fa;
      --bg-2: #dde7f5;
      --glow-a: rgba(190, 140, 63, 0.10);
      --glow-b: rgba(112, 146, 218, 0.10);
      --panel-top: rgba(255, 255, 255, 0.82);
      --panel-bottom: rgba(255, 255, 255, 0.66);
      --panel-border: rgba(28, 39, 64, 0.10);
      --text: #1d2740;
      --muted: #62708a;
      --box-bg: rgba(255, 255, 255, 0.78);
      --box-border: rgba(28, 39, 64, 0.11);
      --accent: #bb8330;
      --accent-2: #9f6d26;
      --accent-soft: rgba(187, 131, 48, 0.16);
      --button-text: #ffffff;
      --status: #a36c22;
      --reveal-bg-1: #f7eee2;
      --reveal-bg-2: #ead8c2;
      --reveal-text: #2b1a10;
      --shadow: 0 26px 72px rgba(52, 71, 110, 0.14);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg-solid);
      overscroll-behavior: none;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background-color: var(--bg-solid);
      background-image:
        radial-gradient(circle at top left, var(--glow-a), transparent 28%),
        radial-gradient(circle at bottom right, var(--glow-b), transparent 24%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      background-repeat: no-repeat;
      background-attachment: fixed;
      transition: background-color 180ms ease, color 180ms ease;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .page,
    .reveal-screen {
      min-height: 100vh;
      width: 100%;
      padding: 20px 28px 16px;
      display: grid;
      place-items: center;
      background: transparent;
    }

    .shell {
      width: min(100%, 860px);
      min-height: auto;
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      padding: 54px;
      background: linear-gradient(180deg, var(--panel-top), var(--panel-bottom));
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.035) 46%, transparent 100%);
      pointer-events: none;
    }

    .theme-toggle {
      position: absolute;
      top: 22px;
      right: 22px;
      z-index: 3;
      width: 54px;
      height: 54px;
      padding: 0;
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.11);
      box-shadow: 0 12px 28px rgba(0,0,0,0.16);
    }

    .theme-toggle:focus-visible,
    .digit:focus-visible,
    .button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 5px var(--accent-soft);
    }

    body.light .theme-toggle {
      background: rgba(255,255,255,0.90);
      border-color: rgba(28,39,64,0.11);
      box-shadow: 0 10px 28px rgba(53,73,112,0.10);
    }

    .theme-icon {
      width: 100%;
      height: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-size: 24px;
      transform: translateY(-1px);
    }

    .theme-icon.sun::before { content: "☀"; }
    .theme-icon.moon::before { content: "☾"; }

    .eyebrow {
      margin-bottom: 14px;
      font-size: 0.78rem;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0 0 14px;
      max-width: 12ch;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      line-height: 0.95;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .subtext {
      max-width: 36ch;
      margin: 0 0 36px;
      font-size: 1.06rem;
      line-height: 1.72;
      color: var(--muted);
    }

    .code-area {
      display: flex;
      flex-wrap: nowrap;
      gap: 14px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .code-area::-webkit-scrollbar { display: none; }

    .digit {
      flex: 0 0 auto;
      width: 88px;
      height: 104px;
      border: 1px solid var(--box-border);
      border-radius: 24px;
      background: var(--box-bg);
      color: var(--text);
      text-align: center;
      font-size: 2.5rem;
      font-weight: 700;
      text-transform: uppercase;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .digit:hover {
      border-color: rgba(255,255,255,0.16);
    }

    .digit:focus {
      transform: translateY(-1px);
      border-color: rgba(216, 177, 107, 0.72);
      background: rgba(255,255,255,0.075);
    }

    body.light .digit {
      background: rgba(255,255,255,0.76);
      border-color: rgba(28,39,64,0.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
    }

    body.light .digit:hover {
      border-color: rgba(28,39,64,0.16);
    }

    .controls {
      margin-bottom: 18px;
    }

    .button {
      appearance: none;
      border: 1px solid rgba(216, 177, 107, 0.42);
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--button-text);
      background: linear-gradient(180deg, rgba(216, 177, 107, 0.18), rgba(216, 177, 107, 0.08));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, border-color 160ms ease, opacity 160ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
      border-color: rgba(216, 177, 107, 0.6);
      box-shadow: 0 14px 30px rgba(0,0,0,0.18);
    }

    body.light .button {
      background: linear-gradient(180deg, #ca9442, #b27c2e);
      border-color: #a5722a;
      color: #fff;
      box-shadow: 0 12px 26px rgba(185, 129, 47, 0.20);
    }

    body.light .button:hover {
      background: linear-gradient(180deg, #d29c48, #b98431);
    }

    .tries {
      margin-bottom: 10px;
      font-size: 0.98rem;
      color: var(--muted);
    }

    .status {
      min-height: 30px;
      font-size: 1rem;
      color: var(--status);
    }

    .locked .digit,
    .locked .button {
      opacity: 0.56;
      pointer-events: none;
    }

    .reveal-screen {
      display: grid;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      background:
        radial-gradient(circle at top center, rgba(255,186,89,0.20), transparent 22%),
        radial-gradient(circle at center, rgba(255,138,44,0.09), transparent 32%),
        linear-gradient(180deg, var(--reveal-bg-1), var(--reveal-bg-2));
      background-attachment: fixed;
      transition: opacity 900ms ease, visibility 900ms ease;
    }

    .reveal-screen.active {
      display: grid;
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .reveal-wrap {
      width: min(100%, 980px);
      text-align: center;
      color: var(--reveal-text);
      transform: translateY(22px);
      opacity: 0;
      transition: opacity 1400ms ease 250ms, transform 1400ms ease 250ms;
    }

    .reveal-screen.active .reveal-wrap {
      transform: translateY(0);
      opacity: 1;
    }

    .reveal-mark {
      margin-bottom: 22px;
      font-size: 0.78rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0.88;
    }

    .reveal-title {
      margin: 0 0 30px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      line-height: 1.02;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .riddle-frame {
      padding: 40px 34px;
      border-radius: 30px;
      border: 1px solid rgba(255, 225, 175, 0.22);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      box-shadow: 0 24px 70px rgba(0,0,0,0.22);
    }

    body.light .riddle-frame {
      border-color: rgba(159,111,39,0.18);
      background: rgba(255,255,255,0.46);
      box-shadow: 0 20px 60px rgba(126,92,45,0.10);
    }

    .riddle {
      margin: 0;
      white-space: pre-line;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.1rem, 5vw, 4rem);
      line-height: 1.58;
    }

    
    @media (max-width: 900px) {
      .shell {
        min-height: auto;
      }
    }

    @media (max-width: 700px) {
      .page,
      .reveal-screen {
        padding: 12px 14px 10px;
      }

      .shell {
        min-height: auto;
        padding: 28px 20px 24px;
        border-radius: 26px;
      }

      .theme-toggle {
        top: 18px;
        right: 18px;
        width: 52px;
        height: 52px;
      }

      h1 {
        max-width: none;
        font-size: clamp(2.2rem, 11vw, 3.8rem);
      }

      .subtext {
        max-width: none;
        font-size: 1rem;
      }

      .code-area {
        gap: 10px;
      }

      .digit {
        width: 58px;
        height: 72px;
        border-radius: 18px;
        font-size: 2rem;
      }

      .riddle-frame {
        padding: 28px 22px;
      }

      .riddle {
        font-size: clamp(1.9rem, 8vw, 2.8rem);
      }
    }
    
      #epilogueText {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.3rem;
      letter-spacing: 0.04em;
      color: var(--muted);
      opacity: 0;
      transition: opacity 3s ease;
      pointer-events: none;
      z-index: 9999;
      text-align: center;
      width: 100%;
    }
    
  </style>
</head>
<body>
  <section class="page" id="entryScreen">
    <main class="shell" id="shell">
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle light and dark mode">
        <span class="theme-icon moon" id="themeIcon"></span>
      </button>

      <div class="eyebrow">Private Entry</div>
      <h1>Enter the five-character code</h1>
      <p class="subtext">
        A single code unlocks what waits beyond.
      </p>

      <section aria-label="Code entry">
        <div class="code-area">
          <input class="digit" type="text" maxlength="1" autocomplete="off" inputmode="text" />
          <input class="digit" type="text" maxlength="1" autocomplete="off" inputmode="text" />
          <input class="digit" type="text" maxlength="1" autocomplete="off" inputmode="text" />
          <input class="digit" type="text" maxlength="1" autocomplete="off" inputmode="text" />
          <input class="digit" type="text" maxlength="1" autocomplete="off" inputmode="text" />
        </div>

        <div class="controls">
          <button class="button" id="unlockBtn" type="button">Unlock</button>
        </div>

        <div class="tries" id="triesText">3 attempts remaining</div>
        <div class="status" id="status" aria-live="polite"></div>
      </section>
    </main>
  </section>

  <section class="reveal-screen" id="revealScreen">
    <div class="reveal-wrap">
      <div class="riddle-frame">
        <p class="riddle">Here, the hunt concludes.</p>
      </div>
    </div>
  </section>
  
  <div id="epilogueText">
    But there is an epilogue.
  </div>
  
  <script>
    const inputs = Array.from(document.querySelectorAll('.digit'));
    const unlockBtn = document.getElementById('unlockBtn');
    const triesText = document.getElementById('triesText');
    const status = document.getElementById('status');
    const shell = document.getElementById('shell');
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const entryScreen = document.getElementById('entryScreen');
    const revealScreen = document.getElementById('revealScreen');

    const validCodes = ['37NI3'];
    const resetCode = '13579';
    const maxAttempts = 3;

    const attemptsKey = 'riddle_attempts_remaining';
    const lockedKey = 'riddle_locked';
    const themeKey = 'riddle_theme';
    const solvedKey = 'riddle_solved';

    function getCode() {
      return inputs.map((input) => input.value.toUpperCase()).join('');
    }

    function clearInputs() {
      inputs.forEach((input) => {
        input.value = '';
      });
      inputs[0].focus();
    }

    function getRemainingAttempts() {
      const stored = parseInt(localStorage.getItem(attemptsKey), 10);
      return Number.isNaN(stored) ? maxAttempts : stored;
    }

    function setRemainingAttempts(value) {
      localStorage.setItem(attemptsKey, String(value));
    }

    function isLocked() {
      return localStorage.getItem(lockedKey) === 'true';
    }

    function setLocked(value) {
      localStorage.setItem(lockedKey, value ? 'true' : 'false');
    }

    function isSolved() {
      return localStorage.getItem(solvedKey) === 'true';
    }

    function setSolved(value) {
      localStorage.setItem(solvedKey, value ? 'true' : 'false');
    }

    function applyTheme(theme) {
      if (theme === 'light') {
        document.body.classList.add('light');
        themeIcon.className = 'theme-icon sun';
      } else {
        document.body.classList.remove('light');
        themeIcon.className = 'theme-icon moon';
      }
      localStorage.setItem(themeKey, theme);
    }

    function updateAttemptsUI() {
      const remaining = getRemainingAttempts();

      if (isLocked()) {
        triesText.textContent = 'No attempts remaining.';
        shell.classList.add('locked');
        status.textContent = 'This page has been locked after 3 incorrect attempts.';
      } else {
        triesText.textContent = remaining === 1 ? '1 attempt remaining' : `${remaining} attempts remaining`;
        shell.classList.remove('locked');
      }
    }

      function showRevealScreen() {
      entryScreen.style.display = 'none';
      revealScreen.style.display = 'grid';

      document.getElementById('epilogueText').style.opacity = '0';

      requestAnimationFrame(() => {
        revealScreen.classList.add('active');
      });

      window.scrollTo({ top: 0, behavior: 'smooth' });

      setTimeout(() => {
        document.getElementById('epilogueText').style.opacity = '1';
      }, 10000);
    }

    function showEntryScreen() {
      revealScreen.classList.remove('active');
      revealScreen.style.display = 'none';
      entryScreen.style.display = 'grid';
    }

    function handleUnlock() {
      const code = getCode();

      if (code.length !== 5) {
        status.textContent = 'Please enter all five characters.';
        return;
      }

      if (code === resetCode) {
        setRemainingAttempts(maxAttempts);
        setLocked(false);
        setSolved(false);
        status.textContent = 'Attempts have been reset.';
        updateAttemptsUI();
        clearInputs();
        return;
      }

      if (isLocked()) {
        updateAttemptsUI();
        return;
      }

      if (validCodes.includes(code)) {
        status.textContent = 'Code accepted.';
        setSolved(true);
        showRevealScreen();
        return;
      }

      const remaining = Math.max(0, getRemainingAttempts() - 1);
      setRemainingAttempts(remaining);

      if (remaining === 0) {
        setLocked(true);
        status.textContent = 'This page has been locked after 3 incorrect attempts.';
      } else {
        status.textContent = `That code is not correct. ${remaining === 1 ? '1 attempt remaining.' : `${remaining} attempts remaining.`}`;
      }

      updateAttemptsUI();
    }

    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        const clean = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        e.target.value = clean;

        if (clean && index < inputs.length - 1) {
          inputs[index + 1].focus();
          inputs[index + 1].select();
        }
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) {
          inputs[index - 1].focus();
        }

        if (e.key === 'ArrowLeft' && index > 0) {
          inputs[index - 1].focus();
        }

        if (e.key === 'ArrowRight' && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }

        if (e.key === 'Enter') {
          e.preventDefault();
          handleUnlock();
        }
      });

      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = (e.clipboardData.getData('text') || '')
          .toUpperCase()
          .replace(/[^A-Z0-9]/g, '')
          .slice(0, 5);

        pasted.split('').forEach((char, i) => {
          if (inputs[i]) {
            inputs[i].value = char;
          }
        });

        const nextIndex = Math.min(pasted.length, inputs.length - 1);
        inputs[nextIndex].focus();
      });
    });

    unlockBtn.addEventListener('click', handleUnlock);

    themeToggle.addEventListener('click', () => {
      const nextTheme = document.body.classList.contains('light') ? 'dark' : 'light';
      applyTheme(nextTheme);
    });

    const savedTheme = localStorage.getItem(themeKey) || 'dark';
    applyTheme(savedTheme);

    if (localStorage.getItem(attemptsKey) === null) {
      setRemainingAttempts(maxAttempts);
    }

    updateAttemptsUI();

    setSolved(false);
    showEntryScreen();
    inputs[0].focus();

    
  </script>
</body>
</html>
